# File-access detections (open/openat/openat2).

- name: sensitive_file_read
  desc: A process read a sensitive system credential file
  event: open
  priority: high
  mitre: T1003.008
  match:
    access: read
    path_exact: [/etc/shadow, /etc/sudoers, /etc/gshadow]

- name: ssh_private_key_read
  desc: A process read an SSH private key
  event: open
  priority: high
  mitre: T1552.004
  match:
    access: read
    path_contains: [/.ssh/id_]

- name: cloud_credentials_read
  desc: A process read cloud provider credentials
  event: open
  priority: high
  mitre: T1552.001
  match:
    access: read
    path_contains: [/.aws/credentials, /.config/gcloud/, /.azure/]

- name: write_to_bindir
  desc: A process wrote to a system binary directory
  event: open
  priority: high
  mitre: T1543
  match:
    access: write
    path_prefix: [/usr/bin/, /bin/, /usr/local/bin/, /usr/sbin/, /sbin/]

- name: credential_file_write
  desc: A process modified a system credential file
  event: open
  priority: critical
  mitre: T1098
  match:
    access: write
    path_exact: [/etc/passwd, /etc/shadow, /etc/sudoers]

- name: authorized_keys_write
  desc: A process wrote to an SSH authorized_keys file (persistence)
  event: open
  priority: high
  mitre: T1098.004
  match:
    access: write
    path_contains: [/.ssh/authorized_keys]
